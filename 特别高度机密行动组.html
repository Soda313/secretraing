<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="减脂打卡">
<title>居家减脂打卡</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #0f0f0f; --bg2: #1a1a2e; --card: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07); --text: #e8e8e8; --dim: rgba(255,255,255,0.35);
  --dim2: rgba(255,255,255,0.2); --green: #4ade80; --green-bg: rgba(74,222,128,0.1);
  --red: #f87171; --yellow: #fbbf24; --purple: #818cf8; --cyan: #22d3ee;
}
body {
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, #16213e 100%);
  color: var(--text); min-height: 100vh; padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
}
.header {
  padding: 28px 20px 18px; background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.header-top { display:flex; justify-content:space-between; align-items:flex-start; }
.header h1 { font-size:24px; font-weight:700; letter-spacing:0.5px; color:#fff; }
.header .sub { font-size:12px; color:var(--dim); margin-top:4px; }
.streak-box { text-align:right; }
.streak-num { font-size:30px; font-weight:800; color:var(--green); line-height:1; }
.streak-label { font-size:10px; color:var(--dim); margin-top:2px; }
.phase-bar { display:flex; gap:7px; margin-top:16px; }
.phase-btn {
  flex:1; padding:9px 4px; border-radius:10px; border:1px solid var(--border);
  background: var(--card); color:var(--dim); font-size:12px; text-align:center; cursor:pointer;
  transition: all 0.2s;
}
.phase-btn.active { border-color:var(--green); background:var(--green-bg); color:var(--green); font-weight:600; }
.phase-btn small { display:block; font-size:10px; margin-top:2px; opacity:0.7; }
.week-nav { padding:14px 20px 6px; }
.week-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.week-header span { font-size:13px; color:var(--dim); }
.nav-btn { background:none; border:none; color:var(--dim); font-size:20px; cursor:pointer; padding:4px 10px; }
.back-btn {
  background:none; border:1px solid var(--border); color:var(--dim); font-size:11px;
  padding:2px 10px; border-radius:4px; cursor:pointer; margin-left:8px;
}
.week-row { display:flex; gap:5px; }
.day-btn {
  flex:1; padding:7px 0; border-radius:10px; border:1px solid rgba(255,255,255,0.06);
  background: var(--card); text-align:center; cursor:pointer; transition:all 0.15s;
}
.day-btn.sel { border-color:var(--green); background:var(--green-bg); }
.day-btn .dl { font-size:11px; color:var(--dim); }
.day-btn.today .dl { color:var(--green); }
.day-btn .dd { font-size:15px; font-weight:500; color:var(--dim); margin-top:2px; }
.day-btn.sel .dd { color:#fff; font-weight:700; }
.day-btn.done .dd { color:var(--green); }
.day-btn .ds { font-size:10px; margin-top:2px; min-height:14px; }
.content { padding:6px 20px; }
.section {
  margin-bottom:10px; border-radius:14px; border:1px solid var(--border);
  background:var(--card); overflow:hidden;
}
.section-header {
  display:flex; align-items:center; justify-content:space-between; padding:15px 16px;
  cursor:pointer; user-select:none;
}
.section-header .bar { width:4px; height:18px; border-radius:2px; margin-right:10px; flex-shrink:0; }
.section-header .stitle { font-size:14px; font-weight:600; color:var(--text); }
.section-header .ssub { font-size:11px; color:var(--dim); margin-top:2px; }
.section-header .arrow {
  font-size:14px; color:var(--dim2); transition:transform 0.2s; flex-shrink:0;
}
.section-header .arrow.open { transform:rotate(90deg); }
.section-body { padding:0 16px 16px; }
.exercise-item {
  display:flex; align-items:flex-start; padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; user-select:none;
}
.exercise-item:last-child { border-bottom:none; }
.checkbox {
  width:26px; height:26px; border-radius:7px; border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  margin-right:12px; margin-top:1px; transition:all 0.15s; font-size:13px; font-weight:700;
  color:transparent;
}
.checkbox.checked { border:none; background:var(--green); color:var(--bg); }
.ex-name { font-size:14px; font-weight:500; color:var(--text); }
.ex-name.checked { color:var(--dim); text-decoration:line-through; }
.ex-tip { font-size:12px; color:var(--dim2); margin-top:2px; line-height:1.5; }
.detail-toggle {
  font-size:12px; color:var(--cyan); cursor:pointer; margin-top:5px;
  display:inline-block; user-select:none;
}
.ex-detail {
  font-size:12px; color:rgba(255,255,255,0.45); margin-top:6px; line-height:1.7;
  padding:10px 12px; background:rgba(255,255,255,0.02); border-radius:8px;
  border-left:2px solid rgba(255,255,255,0.08);
}
.complete-btn {
  width:100%; margin-top:12px; padding:12px; border-radius:8px; font-size:14px;
  font-weight:600; cursor:pointer; transition:all 0.15s;
}
.complete-btn.off { border:1.5px dashed var(--border); background:transparent; color:var(--dim); }
.complete-btn.on { border:1.5px solid var(--green); background:var(--green-bg); color:var(--green); }
.stretch-row {
  display:flex; align-items:center; padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.stretch-row:last-child { border-bottom:none; }
.stretch-tag { font-size:10px; color:var(--purple); font-weight:600; margin-right:8px; flex-shrink:0; }
.stretch-name { font-size:13px; flex:1; }
.stretch-time { font-size:12px; color:var(--dim); flex-shrink:0; }
.micro-row { padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.micro-row:last-child { border-bottom:none; }
.micro-name { font-size:13px; }
.micro-detail { font-size:12px; color:var(--dim2); margin-top:2px; }
.micro-counter {
  display:flex; align-items:center; justify-content:space-between; margin-top:14px;
  padding:12px 16px; background:rgba(34,211,238,0.06); border-radius:10px;
  border:1px solid rgba(34,211,238,0.15);
}
.micro-num { font-size:24px; font-weight:700; color:var(--cyan); }
.micro-label { font-size:13px; color:var(--dim); margin-left:8px; }
.micro-add {
  padding:10px 22px; border:none; border-radius:8px; background:var(--cyan);
  color:var(--bg); font-size:14px; font-weight:700; cursor:pointer;
}
.rest-toggle {
  display:flex; justify-content:flex-end; margin-bottom:8px;
}
.rest-btn {
  padding:6px 14px; border:1px solid var(--border); border-radius:6px;
  background:var(--card); color:var(--dim); font-size:12px; cursor:pointer;
}
.rest-view {
  text-align:center; padding:40px 20px;
}
.rest-view .emoji { font-size:48px; margin-bottom:12px; }
.rest-view .rtitle { font-size:18px; color:var(--dim); margin-bottom:6px; }
.rest-view .rsub { font-size:13px; color:var(--dim2); margin-bottom:24px; }
.done-banner {
  text-align:center; padding:24px; margin-top:12px; border-radius:14px;
  background:linear-gradient(135deg, var(--green-bg) 0%, rgba(34,211,238,0.08) 100%);
  border:1px solid rgba(74,222,128,0.2);
}
.done-banner .emoji { font-size:32px; margin-bottom:8px; }
.done-banner .dtitle { font-size:18px; font-weight:700; color:var(--green); }
.done-banner .dsub { font-size:13px; color:var(--dim); margin-top:4px; }
.warmup-row {
  display:flex; align-items:flex-start; padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.warmup-row:last-child { border-bottom:none; }
.warmup-time { font-size:12px; color:var(--dim); width:70px; flex-shrink:0; }
.warmup-name { font-size:13px; }
.warmup-tip { font-size:12px; color:var(--dim2); margin-top:2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const PHASES = [
  {
    name:"第一阶段·唤醒", weeks:"第 1-2 周", rounds:2, work:25, rest:20, roundRest:60,
    exercises:[
      {name:"臀桥",
       tip:"夹紧屁股顶髋，顶端停1秒",
       detail:"仰卧在地上，双脚踩地与肩同宽，膝盖弯曲约90度，双手放身体两侧掌心朝下。发力时夹紧屁股，把髋部往天花板方向顶起来，直到身体从肩膀到膝盖成一条直线。在最高点夹紧屁股停1秒，然后慢慢放下来。全程脚掌不要离地，不要用腰往上拱——发力点是屁股，不是腰。如果感觉腰酸说明臀肌没有发力，试试顶起来之前先用力夹一下屁股再往上推。"},
      {name:"跪姿俯卧撑",
       tip:"头到膝一条线，胸快碰地再推起",
       detail:"双膝跪地（膝盖下面垫个毛巾或枕头会舒服一些），双手撑地比肩略宽，手指朝前。关键是从头到膝盖要保持一条直线，不要撅屁股也不要塌腰。弯曲手肘让胸口慢慢往下沉，直到快碰到地面，然后推起来回到起始位置。下去的时候吸气，推起来时呼气。如果一个都做不了，可以先把手撑在沙发座面上做高位版本，等力量上来了再下到地面做。"},
      {name:"站姿交替后撤步",
       tip:"后撤不前迈，前膝不超脚尖",
       detail:"双脚与肩同宽站直，然后一条腿往后迈一大步，前腿膝盖弯曲但不超过脚尖，后腿膝盖朝地面方向弯但不用碰地。然后后脚蹬地收回来站直，换另一条腿重复。注意是「后撤」不是「前迈」，后撤步对膝盖的剪切力比前迈小很多，这就是为什么选这个动作而不是前弓步。身体全程保持直立，不要前倾。"},
      {name:"死虫式（简化版）",
       tip:"对侧手脚伸展，腰紧贴地面",
       detail:"仰卧在地上，双手伸直指向天花板，双腿抬起屈膝呈90度（大腿垂直地面，小腿平行地面）。然后右手往头顶方向伸直、同时左腿往前伸直（但不碰地），停一下，回到起始位置，然后换左手+右腿。全程最重要的一点：腰部紧贴地面不要拱起来。如果腰拱起来了，说明幅度太大了，缩小伸展范围。这是核心训练里最安全的入门动作。"},
      {name:"俯卧Y字飞鸟",
       tip:"肩胛骨往中间夹停2秒，目光看地",
       detail:"趴在地上，额头轻贴地面（或垫一条毛巾），双臂往前上方伸展成Y字形，大拇指朝上指向天花板。然后慢慢把双臂抬离地面，不用抬很高，3-5厘米就够了，关键是感觉到两块肩胛骨在往脊柱方向靠拢（想象背后夹一支笔）。在最高点停2秒，然后慢慢放下。全程不要抬头看前方，目光始终看地面，否则脖子会代偿发力导致颈椎不舒服。"},
    ]
  },
  {
    name:"第二阶段·加量", weeks:"第 3-4 周", rounds:3, work:30, rest:15, roundRest:45,
    exercises:[
      {name:"单腿臀桥",
       tip:"一腿伸直抬起，单腿撑地顶髋",
       detail:"和臀桥一样的起始姿势，但是把一条腿伸直抬起来（可以稍微弯曲也行），只用另一条腿的脚踩地。然后单腿发力顶髋上去，夹紧屁股停1秒再放下。做完一侧换另一侧。单腿版本强度是双腿的近两倍，一开始可能顶不太高，没关系，能顶多高顶多高。如果歪斜得厉害，说明两侧力量不平衡，多练弱的那侧。"},
      {name:"慢速跪姿俯卧撑",
       tip:"下去3秒，推起1秒",
       detail:"动作和第一阶段的跪姿俯卧撑一模一样，但是把速度放慢：下去用3秒钟（心里默数1、2、3），到底之后推起来1秒。这种「慢速离心」的方式能让肌肉在紧张状态下保持更长时间，刺激更大，力量进步也更快。如果你这时候已经能做标准俯卧撑了，就直接做标准版，但同样保持慢速下去。"},
      {name:"交替侧弓步",
       tip:"侧迈下沉，感受大腿内侧拉伸",
       detail:"双脚并拢站直，然后右脚向右侧迈出一大步，同时右腿弯曲下蹲、左腿保持伸直，身体重心移向右侧。感受左腿大腿内侧的拉伸和右腿的发力。然后右脚蹬地回到站直姿势，换左边做。下蹲那条腿的膝盖方向要和脚尖一致，不要内扣。如果柔韧性不够迈不了太远，就小步一点，慢慢加。"},
      {name:"死虫式（完整版）",
       tip:"幅度更大，腰部全程贴地",
       detail:"和简化版一样的起始姿势，但这次手和脚都伸展到离地面更近的位置——手往头顶方向尽量伸直、对侧腿也尽量伸直且更低（但始终不碰地）。幅度越大核心需要越强的力量来稳定腰椎。牢记黄金法则：腰贴地面。如果腰拱起来了就缩小幅度，宁可小幅度做标准也不要大幅度做歪了。"},
      {name:"T-W-Y组合飞鸟",
       tip:"三个角度各停2秒，覆盖整个背部",
       detail:"趴在地上，先做T字：双臂往两侧平伸成T形，大拇指朝上，抬起双臂夹肩胛骨停2秒放下；然后做W字：双肘弯曲约90度，像投降姿势，抬起双臂夹肩胛骨停2秒放下；最后做Y字：双臂往前上方伸成Y形，抬起停2秒放下。T→W→Y连做完算一次。T练中背菱形肌，W练下斜方肌（改善含胸的关键），Y练上背。三个角度合起来基本覆盖了整个背部。"},
    ]
  },
  {
    name:"第三阶段·燃脂", weeks:"第 5-6 周", rounds:3, work:35, rest:12, roundRest:30,
    exercises:[
      {name:"深蹲",
       tip:"屁股后坐如坐椅子，膝盖不内扣",
       detail:"双脚与肩同宽或略宽站立，脚尖自然微微外展（约15-30度）。下蹲时想象身后有一把椅子要往后坐，屁股先往后推、然后弯膝下蹲，直到大腿大约与地面平行（或者你能控制到的最低位置），然后脚跟发力站起来。全程注意三点：①膝盖方向和脚尖一致，绝对不要内扣（可以想象用膝盖去推两侧的墙）；②背部保持挺直不要弯腰；③重心放在脚跟和脚掌中部，不要踮到脚尖上。经过前面4周的臀桥和弓步训练，你的膝盖周围肌肉已经有基础了，可以安全地做这个动作。"},
      {name:"标准俯卧撑",
       tip:"做不了就继续跪姿，不塌腰",
       detail:"双手撑地比肩略宽，双脚并拢脚尖撑地，身体从头到脚跟成一条直线。弯曲手肘让身体下沉到胸口快碰地，然后推起来。如果做不了完整的标准版本也完全没关系，继续做跪姿版本但用慢速（下去3秒），效果一样好。不要为了做标准版而塌腰——宁可做跪姿的标准动作，也不要做歪歪扭扭的标准俯卧撑。"},
      {name:"交替后撤箭步蹲",
       tip:"后膝接近地面，前膝不超脚尖",
       detail:"和第一阶段的后撤步一样，但这次下蹲幅度更大——后腿膝盖接近地面（但不碰地），前腿大腿接近与地面平行。这个加深版本对臀肌和大腿的刺激更强。保持身体直立，不要前倾。如果膝盖不舒服，就退回到第一阶段的浅幅度版本。"},
      {name:"平板支撑转体",
       tip:"交替转身手指天，核心抗旋转",
       detail:"从平板支撑开始（双手撑地、手臂伸直，和俯卧撑起始姿势一样）。然后右手离地，身体转向右侧，右手指向天花板，变成侧面的T字支撑形状，停1秒，然后回到平板位置，换左手做。关键是转体的时候身体不要塌下去，用核心的力量抵抗旋转。一开始做不了可以把双脚分开宽一些增加稳定性。"},
      {name:"超人式+飞鸟",
       tip:"胸口离地同时飞鸟夹背停3秒",
       detail:"趴在地上，双臂在前方伸展。同时把上半身（胸口离地）和双腿抬起来，在这个超人飞行的姿势下做飞鸟——双臂从前方往身体两侧划弧收回来，同时夹紧肩胛骨，到最紧点停3秒，然后手臂伸回前方，身体放下。这个动作把核心、下背和上背的训练合在一起了，是前两个阶段飞鸟和超人式的终极合体版。一开始如果太难，可以上半身和下半身交替抬——先只抬上半身做飞鸟，再只抬腿，降低难度。"},
    ]
  }
];

const WARMUP = [
  {name:"原地踏步", time:"60秒",
   tip:"膝盖稍抬高，手臂自然摆动",
   detail:"就是原地走路，但有意识地把膝盖稍微抬高一些（大腿抬到和地面平行就够了），手臂跟着自然前后摆动。目的是把心率带起来、让全身关节热开。不需要快，匀速走就行。"},
  {name:"站姿髋部画圈", time:"每侧30秒",
   tip:"屈膝抬腿用膝盖画圈，可扶墙",
   detail:"单脚站立（可以一只手扶墙或桌子保持平衡），另一条腿屈膝抬起来，用膝盖在空中画圈。先顺时针画5-6个圈，再逆时针画5-6个圈，然后换腿。圈不用画很大，感觉髋关节在灵活地转动就对了。你第一次做可能会觉得髋部咔咔响或者很僵，那就是久坐导致的，多做几天就会顺畅。"},
];

const STRETCHES = [
  {name:"婴儿式", time:"30-45秒", priority:true,
   detail:"跪在地上，屁股坐到脚后跟上，双手尽量往前伸，额头贴地，胸口往下沉。全身放松，自然呼吸。感觉整个背部从上到下都在被温柔地拉开。膝盖不舒服的话在膝盖下垫个枕头。"},
  {name:"弓步拉髋屈肌", time:"每侧30秒", priority:true,
   detail:"前脚踩地做弓步，后腿尽量往后伸直，身体立直。你会感觉后腿大腿根前侧（裤兜那个位置）有明显的拉伸感。这块叫髂腰肌，久坐它会缩短变紧，是腰酸背痛的主要元凶。可以把双手举过头顶加大拉伸幅度。"},
  {name:"仰卧脊柱扭转", time:"每侧30秒", priority:true,
   detail:"仰卧在地上，双臂往两侧张开成T字。一条腿弯曲，用对侧手把膝盖轻轻拉向身体另一侧（右膝拉向左边），让膝盖尽量碰到地面，碰不到也没关系。头转向相反方向。你可能会听到背部噼里啪啦响几下，那是脊椎小关节在释放气泡，很正常，做完会觉得整个背像换了一副新的。"},
  {name:"猫牛式", time:"8-10次",
   detail:"四点跪姿（手在肩正下方，膝在髋正下方）。吸气时慢慢塌腰、抬头、屁股翘起来（牛式）；呼气时拱背、低头、收紧肚子（猫式）。一呼一吸算一次，做8-10次。动作要慢，感受每一节脊椎都在活动。这是久坐人群的腰背万能药。"},
  {name:"仰卧抱膝", time:"每侧20秒+双腿20秒",
   detail:"仰卧，一条腿弯曲用双手抱住膝盖往胸口拉，另一条腿伸直放在地上。感觉下背部被温柔地压向地面。左右各做一次，最后双腿同时抱住再做20秒。下背酸的人做完会非常舒服。"},
  {name:"门框背阔肌拉伸", time:"每侧20秒",
   detail:"站在门框旁，双手抓住门框（大约在头顶高度），然后屁股往后坐、身体往下沉，手臂伸直。感觉从腋下到腰侧有拉伸感。这拉的是背阔肌，背部最大的一块肌肉。"},
  {name:"胸部门框拉伸", time:"每侧15秒",
   detail:"站在门框旁，一只手臂抬到90度（手肘和肩膀同高），前臂搭在门框上。身体往前迈一步，感觉胸口和肩膀前侧的拉伸。久坐含胸的人这块会特别紧，拉开之后马上会觉得呼吸都顺畅了。"},
  {name:"站姿体前屈", time:"30秒",
   detail:"双脚与肩同宽站直，慢慢弯腰往下够脚尖，膝盖可以微弯。够不到脚尖完全没关系，感觉到大腿后侧和腰背有拉伸感就对了。自然呼吸，不要憋气，不要上下弹震。"},
];

const MICRO = [
  {name:"站姿夹臀", detail:"5-6次，用力夹紧屁股3秒后松开",
   full:"站直，双脚与肩同宽。用力夹紧屁股保持3秒，然后彻底松开，重复5-6次。久坐最大的问题是臀肌忘了怎么发力，这个动作就是反复提醒它醒过来。"},
  {name:"站姿飞鸟", detail:"10次，上3秒停3秒下3秒",
   full:"站直，手臂自然下垂在身体两侧，掌心朝前。慢慢把双臂往两侧打开，同时肩胛骨往中间夹（想象背后夹着一支笔），手臂抬到和肩膀平齐，停3秒，再慢慢放下。做完马上会觉得背挺起来了。"},
  {name:"坐姿脊柱转体", detail:"每侧15秒",
   full:"坐在椅子上，双脚踩地。一只手搭在对侧膝盖上，另一只手搭在椅背上，慢慢转身往后看，感觉整个腰背有旋转拉伸感。保持15秒，换另一侧。"},
  {name:"坐姿翘腿拉梨状肌", detail:"每侧15秒",
   full:"坐在椅子上，把一只脚的脚踝搭在另一条腿的膝盖上（翘二郎腿的姿势），然后身体稍微前倾。你会感觉搭着的那条腿屁股深处有拉伸感。这块叫梨状肌，久坐它会紧到压迫坐骨神经，屁股坐麻了往往就是它的问题。"},
];

const WEEKDAYS = ["一","二","三","四","五","六","日"];

function getToday(){ return new Date().toISOString().slice(0,10); }
function fmtDate(s){ const d=new Date(s+"T00:00:00"); return (d.getMonth()+1)+"/"+d.getDate(); }
function getWeekDates(offset){
  const t=new Date(), day=t.getDay();
  const mon=new Date(t); mon.setDate(t.getDate()-((day+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().slice(0,10);});
}
function loadRec(date){
  try{const s=localStorage.getItem("wk:"+date);return s?JSON.parse(s):null;}catch(e){return null;}
}
function saveRec(date,rec){ try{localStorage.setItem("wk:"+date,JSON.stringify(rec));}catch(e){} }
function getRec(date){ return loadRec(date)||{warmup:false,main:[],stretch:false,micro:0,completed:false,rest:false}; }
function loadPhase(){ try{return parseInt(localStorage.getItem("wk:phase")||"0",10);}catch(e){return 0;} }
function savePhase(p){ try{localStorage.setItem("wk:phase",String(p));}catch(e){} }

function calcStreak(){
  let count=0; const d=new Date();
  const todayRec=getRec(getToday());
  const todayDone=todayRec.completed||todayRec.rest;
  if(!todayDone) d.setDate(d.getDate()-1);
  for(let i=0;i<90;i++){
    const s=d.toISOString().slice(0,10), r=getRec(s);
    if(r.completed||r.rest){count++; d.setDate(d.getDate()-1);}
    else break;
  }
  if(todayDone) count++;
  return count;
}

let state = {
  phase: loadPhase(), weekOffset:0, selectedDate:getToday(),
  expanded:"main", openDetails:{}
};

function render(){
  const today=getToday(), phase=PHASES[state.phase], weekDates=getWeekDates(state.weekOffset);
  const rec=getRec(state.selectedDate), streak=calcStreak();
  const completedDays=weekDates.filter(d=>{const r=getRec(d);return r.completed||r.rest;}).length;

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <h1>居家减脂打卡</h1>
        <p class="sub">两人同练 · 零跳跃 · 膝盖友好</p>
      </div>
      <div class="streak-box">
        <div class="streak-num">${streak}</div>
        <div class="streak-label">连续天数</div>
      </div>
    </div>
    <div class="phase-bar">
      ${PHASES.map((p,i)=>`
        <div class="phase-btn ${i===state.phase?'active':''}" onclick="setPhase(${i})">
          ${p.name}<small>${p.weeks}</small>
        </div>`).join("")}
    </div>
  </div>

  <div class="week-nav">
    <div class="week-header">
      <button class="nav-btn" onclick="navWeek(-1)">‹</button>
      <span>本周完成 ${completedDays}/7${state.weekOffset!==0?`<button class="back-btn" onclick="goToday()">回到今天</button>`:''}</span>
      <button class="nav-btn" onclick="navWeek(1)">›</button>
    </div>
    <div class="week-row">
      ${weekDates.map((d,i)=>{
        const r=getRec(d), done=r.completed||r.rest;
        const sel=d===state.selectedDate, isT=d===today;
        return `<div class="day-btn ${sel?'sel':''} ${isT?'today':''} ${done?'done':''}" onclick="selectDate('${d}')">
          <div class="dl">${WEEKDAYS[i]}</div>
          <div class="dd">${fmtDate(d)}</div>
          <div class="ds">${done?(r.rest?'🌙':'✓'):''}</div>
        </div>`;
      }).join("")}
    </div>
  </div>

  <div class="content">`;

  if(rec.rest){
    html+=`<div class="rest-view">
      <div class="emoji">🌙</div>
      <div class="rtitle">休息日</div>
      <div class="rsub">肌肉恢复时在消耗脂肪，建议做5-10分钟拉伸</div>
      <button class="rest-btn" onclick="toggleRest()">改为训练日</button>
    </div>`;
  } else {
    html+=`<div class="rest-toggle"><button class="rest-btn" onclick="toggleRest()">🌙 标记为休息日</button></div>`;

    // Warmup section
    html+=renderSection("warmup","热身","2 分钟",`var(--yellow)`, ()=>{
      let c=WARMUP.map((w,i)=>`
        <div class="warmup-row">
          <div class="warmup-time">${w.time}</div>
          <div>
            <div class="warmup-name">${w.name}</div>
            <div class="warmup-tip">${w.tip}</div>
            ${renderDetailToggle("warmup_"+i, w.detail)}
          </div>
        </div>`).join("");
      c+=`<button class="complete-btn ${rec.warmup?'on':'off'}" onclick="toggleWarmup()">${rec.warmup?'✓ 已完成热身':'完成热身'}</button>`;
      return c;
    });

    // Main training
    html+=renderSection("main",`主训练 · ${phase.name}`,
      `${phase.rounds}轮 · 动作${phase.work}秒 · 休息${phase.rest}秒 · 轮间${phase.roundRest}秒`,
      `var(--red)`, ()=>{
      return phase.exercises.map((ex,i)=>{
        const done=(rec.main||[]).includes(i);
        return `<div class="exercise-item" onclick="toggleMain(${i})">
          <div class="checkbox ${done?'checked':''}">✓</div>
          <div style="flex:1">
            <div class="ex-name ${done?'checked':''}">${ex.name}</div>
            <div class="ex-tip">${ex.tip}</div>
            ${renderDetailToggle("main_"+state.phase+"_"+i, ex.detail)}
          </div>
        </div>`;
      }).join("");
    });

    // Stretch
    html+=renderSection("stretch","拉伸","5 分钟 · 挑 4-5 个 · 标「必做」优先",`var(--purple)`, ()=>{
      let c=STRETCHES.map((s,i)=>`
        <div class="stretch-row">
          ${s.priority?'<span class="stretch-tag">必做</span>':''}
          <span class="stretch-name">${s.name}</span>
          <span class="stretch-time">${s.time}</span>
        </div>
        ${s.detail?renderDetailToggle("stretch_"+i, s.detail, true):''}
      `).join("");
      c+=`<button class="complete-btn ${rec.stretch?'on':'off'}" onclick="toggleStretch()">${rec.stretch?'✓ 已完成拉伸':'完成拉伸'}</button>`;
      return c;
    });

    // Micro
    html+=renderSection("micro","久坐微动","每坐1小时做一次 · 约1分钟",`var(--cyan)`, ()=>{
      let c=MICRO.map((m,i)=>`
        <div class="micro-row">
          <div class="micro-name">${m.name}</div>
          <div class="micro-detail">${m.detail}</div>
          ${renderDetailToggle("micro_"+i, m.full)}
        </div>`).join("");
      c+=`<div class="micro-counter">
        <div><span class="micro-num">${rec.micro||0}</span><span class="micro-label">次微动</span></div>
        <button class="micro-add" onclick="addMicro()">+1</button>
      </div>`;
      return c;
    });

    if(rec.completed){
      html+=`<div class="done-banner">
        <div class="emoji">💪</div>
        <div class="dtitle">今日训练完成！</div>
        <div class="dsub">坚持就是胜利，明天见</div>
      </div>`;
    }
  }
  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
}

function renderSection(key,title,sub,color,contentFn){
  const open=state.expanded===key;
  return `<div class="section">
    <div class="section-header" onclick="toggleSection('${key}')">
      <div style="display:flex;align-items:center">
        <div class="bar" style="background:${color}"></div>
        <div><div class="stitle">${title}</div><div class="ssub">${sub}</div></div>
      </div>
      <span class="arrow ${open?'open':''}">›</span>
    </div>
    ${open?`<div class="section-body">${contentFn()}</div>`:''}
  </div>`;
}

function renderDetailToggle(key, text, standalone){
  const open=state.openDetails[key];
  const wrapper = standalone ? 'style="padding:0 0 8px 0"' : '';
  return `<div ${wrapper}>
    <span class="detail-toggle" onclick="event.stopPropagation();toggleDetail('${key}')">${open?'▾ 收起说明':'▸ 详细做法'}</span>
    ${open?`<div class="ex-detail">${text}</div>`:''}
  </div>`;
}

// Actions
window.setPhase=function(i){state.phase=i;savePhase(i);render();};
window.navWeek=function(d){state.weekOffset+=d;render();};
window.goToday=function(){state.weekOffset=0;state.selectedDate=getToday();render();};
window.selectDate=function(d){state.selectedDate=d;render();};
window.toggleSection=function(k){state.expanded=state.expanded===k?null:k;render();};
window.toggleDetail=function(k){state.openDetails[k]=!state.openDetails[k];render();};

window.toggleWarmup=function(){
  const r=getRec(state.selectedDate); r.warmup=!r.warmup;
  r.completed=r.warmup&&r.stretch&&(r.main||[]).length>=PHASES[state.phase].exercises.length;
  saveRec(state.selectedDate,r); render();
};
window.toggleStretch=function(){
  const r=getRec(state.selectedDate); r.stretch=!r.stretch;
  r.completed=r.warmup&&r.stretch&&(r.main||[]).length>=PHASES[state.phase].exercises.length;
  saveRec(state.selectedDate,r); render();
};
window.toggleMain=function(i){
  const r=getRec(state.selectedDate); const arr=[...(r.main||[])];
  if(arr.includes(i))arr.splice(arr.indexOf(i),1); else arr.push(i);
  r.main=arr;
  r.completed=r.warmup&&r.stretch&&arr.length>=PHASES[state.phase].exercises.length;
  saveRec(state.selectedDate,r); render();
};
window.addMicro=function(){
  const r=getRec(state.selectedDate); r.micro=(r.micro||0)+1;
  saveRec(state.selectedDate,r); render();
};
window.toggleRest=function(){
  const r=getRec(state.selectedDate);
  r.rest=!r.rest; r.completed=false; r.warmup=false; r.main=[]; r.stretch=false;
  saveRec(state.selectedDate,r); render();
};

render();
</script>
</body>
</html>
