<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#161b26;--bg2:#1c2230;--bg3:#222838;--card:rgba(26,32,46,0.88);
--border:rgba(0,200,220,0.1);--border2:rgba(0,200,220,0.05);
--text:#c8d4dc;--text2:#90a4b4;--dim:#607888;--dim2:#445868;
--cyan:#00c8dc;--cyan2:#00a0b4;--cyan-g:rgba(0,200,220,0.1);--cyan-glow:rgba(0,200,220,0.2);
--coral:#ff7a55;--coral-g:rgba(255,122,85,0.1);--coral-glow:rgba(255,122,85,0.25);
--gold:#e0c060;--gold-g:rgba(224,192,96,0.08);
--f:'Exo 2','Noto Sans SC',sans-serif;--fb:'Noto Sans SC',-apple-system,sans-serif;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;
-webkit-font-smoothing:antialiased;
background-image:radial-gradient(circle at 50% 0%,rgba(0,200,220,0.04) 0%,transparent 60%);
}
.hd{padding:0;position:sticky;top:0;z-index:10;background:rgba(22,27,38,0.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:2px solid var(--cyan)}
.hd-in{padding:20px 18px 12px;display:flex;justify-content:space-between;align-items:center}
.hd h1{font-family:var(--f);font-size:14px;font-weight:800;color:var(--cyan);letter-spacing:3px;text-transform:uppercase}
.hd h1::before{content:'//';margin-right:6px;color:var(--dim)}
.sk{display:flex;align-items:center;gap:5px;background:var(--cyan-g);border:1px solid rgba(0,200,220,0.2);padding:4px 12px}
.sk-n{font-family:var(--f);font-size:20px;font-weight:800;color:var(--cyan);line-height:1}

.cb{width:20px;height:20px;border:1.5px solid rgba(0,200,220,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:10px;margin-top:1px;transition:.15s;font-size:10px;font-weight:800;color:transparent}

.en.ck{color:var(--dim2);text-decoration:line-through;font-weight:500}

.tm-area{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:auto;flex-shrink:0}
.tm{display:flex;align-items:center;gap:6px}
.tm-b{font-family:var(--f);font-size:12px;font-weight:700;padding:8px 14px;cursor:pointer;letter-spacing:1px;border:1.5px solid var(--cyan);background:transparent;color:var(--cyan);transition:.15s;min-width:56px;text-align:center}
.tm-b:active{background:var(--cyan);color:var(--bg)}
.tm-b.running{border-color:var(--coral);color:var(--coral);animation:pulse 1s infinite}
.tm-d{font-family:var(--f);font-size:14px;font-weight:800;color:var(--cyan);min-width:40px;text-align:center}
.tm-d.done{color:var(--coral);cursor:pointer}
.tm-d.done:active{opacity:.6}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* ROUND DOTS inline */
.rd-row{display:flex;align-items:center;gap:5px}
.rd-dot{width:9px;height:9px;border:1.5px solid var(--dim2);transition:all .2s}
.rd-dot.done{background:var(--coral);border-color:var(--coral);box-shadow:0 0 5px var(--coral-glow)}

/* BUTTONS */
.cb-btn{width:100%;margin-top:10px;padding:10px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--f);letter-spacing:2px;text-transform:uppercase}
.cb-btn.off{border:1.5px dashed var(--border);background:transparent;color:var(--dim)}
.cb-btn.on{border:none;background:var(--coral);color:#fff;box-shadow:0 0 12px var(--coral-glow)}

.si-r:last-child{border-bottom:none}
.si-t{display:flex;align-items:center}
.stag{font-family:var(--f);font-size:7px;font-weight:800;margin-right:6px;background:var(--coral);color:#fff;padding:2px 6px;letter-spacing:2px;text-transform:uppercase}
.sn{font-size:12px;font-weight:600;flex:1}
.sti{font-size:9px;color:var(--dim);font-family:var(--f);font-weight:600}
/* MICRO */
.mr{padding:8px 0;border-bottom:1px solid var(--border2)}.mr:last-child{border-bottom:none}
.mn{font-size:12px;font-weight:700}.md{font-size:10px;color:var(--dim);margin-top:2px}

.mc-n{font-family:var(--f);font-size:24px;font-weight:800;color:var(--cyan)}
.mc-l{font-size:9px;color:var(--cyan);margin-left:5px;font-weight:700;font-family:var(--f);letter-spacing:1px}

.rt{display:flex;justify-content:flex-end;margin-bottom:6px}
.rb{padding:4px 12px;border:1px solid var(--border);background:none;color:var(--dim);font-size:9px;cursor:pointer;font-family:var(--f);font-weight:600;letter-spacing:1px}
.rv{text-align:center;padding:40px 18px}
.rv .re{font-size:32px;margin-bottom:12px}
.rv .rtt{font-family:var(--f);font-size:16px;font-weight:800;color:var(--text2);letter-spacing:3px}
.rv .rs{font-size:10px;color:var(--dim);margin:8px 0 24px;line-height:1.7}
.dn-b{text-align:center;padding:20px;margin-top:10px;background:linear-gradient(135deg,var(--coral-g),var(--cyan-g));border:1px solid rgba(0,200,220,0.15)}
.dn-b .de{font-size:24px;margin-bottom:6px}
.dn-b .dtt{font-family:var(--f);font-size:14px;font-weight:800;color:var(--coral);letter-spacing:3px;text-transform:uppercase}
.dn-b .dss{font-size:10px;color:var(--dim);margin-top:4px}
/* WARMUP */
.wu{display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border2)}.wu:last-child{border-bottom:none}
.wu-wrap{display:flex;align-items:flex-start;flex:1}
.wt{font-family:var(--f);font-size:9px;font-weight:700;color:var(--cyan);background:var(--cyan-g);border:1px solid rgba(0,200,220,0.15);padding:2px 6px;margin-right:8px;margin-top:2px;flex-shrink:0}
.wna{font-size:12px;font-weight:700}.wtp{font-size:10px;color:var(--dim);margin-top:2px}
/* PROGRESS */
.pg{height:2px;background:var(--border);margin-top:10px;overflow:hidden}.pf{height:100%;background:linear-gradient(90deg,var(--cyan),var(--coral));transition:width .3s}
/* AUDIO INIT */
.audio-init{position:fixed;bottom:0;left:0;right:0;z-index:200;background:linear-gradient(180deg,transparent,rgba(22,27,38,0.98) 20%);padding:30px 18px 28px;text-align:center;transition:transform .4s ease,opacity .4s ease}
.audio-init.hide{transform:translateY(100%);opacity:0;pointer-events:none}
.audio-init-text{font-size:11px;color:var(--dim);margin-bottom:12px;font-family:var(--f);letter-spacing:.5px}
.audio-init-btn{padding:12px 32px;border:2px solid var(--cyan);background:transparent;color:var(--cyan);font-family:var(--f);font-size:12px;font-weight:800;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:.15s}
.audio-init-btn:active{background:var(--cyan);color:var(--bg)}
/* ALL-DONE TOAST */
.all-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:rgba(22,27,38,0.96);border:2px solid var(--coral);padding:28px 36px;z-index:100;text-align:center;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.all-toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
.all-toast .at-icon{font-size:36px;margin-bottom:10px}
.all-toast .at-title{font-family:var(--f);font-size:16px;font-weight:800;color:var(--coral);letter-spacing:2px;margin-bottom:6px}
.all-toast .at-sub{font-size:11px;color:var(--dim);line-height:1.6}
.all-toast .at-btn{margin-top:16px;padding:10px 28px;border:none;background:var(--cyan);color:var(--bg);font-family:var(--f);font-size:11px;font-weight:800;cursor:pointer;letter-spacing:2px;text-transform:uppercase}

</style>

<body>
<div id="app"></div>
<div class="at-overlay" id="atOverlay"></div>
<div class="all-toast" id="allToast">
  <div class="at-icon">🔥</div>
  <div class="at-title" id="atTitle"></div>
  <div class="at-sub" id="atSub"></div>
  <button class="at-btn" onclick="dismissToast()">确认</button>
</div>
<div class="audio-init" id="audioInit">
  <div class="audio-init-text">点击启用计时提示音（iOS需要此步骤）</div>
  <button class="audio-init-btn" onclick="initAudioContext()">🔊 启用提示音</button>
</div>
<script>
// === AUDIO SYSTEM (iOS Safari compatible) ===
let audioCtx=null;let audioUnlocked=false;
function initAudioContext(){
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const buf=audioCtx.createBuffer(1,1,22050);
    const src=audioCtx.createBufferSource();
    src.buffer=buf;src.connect(audioCtx.destination);src.start(0);
    if(audioCtx.state==='suspended') audioCtx.resume();
    audioUnlocked=true;
    setTimeout(()=>{playBeep(660,0.08,0.1);},100);
    document.getElementById('audioInit').classList.add('hide');
    sessionStorage.setItem('audioOK','1');
  }catch(e){document.getElementById('audioInit').classList.add('hide');}
}
function playBeep(freq,dur,vol){
  if(!audioCtx||!audioUnlocked)return;
  try{
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=freq;o.type='square';
    g.gain.setValueAtTime(vol||0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur+0.05);
  }catch(e){}
}
function playTimerDone(){
  if(!audioCtx||!audioUnlocked)return;
  playBeep(880,0.25,0.18);
  setTimeout(()=>playBeep(1100,0.4,0.18),300);
}
if(sessionStorage.getItem('audioOK')==='1'){
  try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();audioUnlocked=true;
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('audioInit').classList.add('hide');});
  }catch(e){}
}

// === TIMER ===
let timers={};let timerIntervals={};
function startTimer(key,secs){
  if(timerIntervals[key]){clearInterval(timerIntervals[key]);delete timerIntervals[key];delete timers[key];render();return;}
  if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
  timers[key]=secs;
  timerIntervals[key]=setInterval(()=>{timers[key]--;if(timers[key]<=0){clearInterval(timerIntervals[key]);delete timerIntervals[key];
    playTimerDone();timers[key]=0;}render();},1000);render();
}
function fmtT(s){if(s===undefined)return'';const m=Math.floor(s/60);const ss=s%60;return(m>0?m+':':'')+(ss<10&&m>0?'0':'')+ss;}

// clicking "完成" after timer ends → advance one round for this exercise
function timerDoneClick(key){
  if(key.startsWith('wu')){
    const idx=parseInt(key.replace('wu',''),10);toggleWarmupItem(idx);
  }else if(key.startsWith('st')){
    const idx=parseInt(key.replace('st',''),10);toggleStretchItem(idx);
  }else if(key.startsWith('m')){
    const parts=key.replace(/^m/,'').split('_');
    if(parts.length===2){
      const idx=parseInt(parts[1],10);
      advanceExRound(idx);
    }
  }
  delete timers[key];render();
}

function timerHTML(key,secs){
  const running=!!timerIntervals[key];const val=timers[key];const done=val===0&&!running;
  let doneHTML='';
  if(done) doneHTML=`<span class="tm-d done" onclick="event.stopPropagation();timerDoneClick('${key}')">✓ 打卡</span>`;
  else if(val!==undefined) doneHTML=`<span class="tm-d">${fmtT(val)}</span>`;
  return`<span class="tm"><button class="tm-b ${running?'running':''}" onclick="event.stopPropagation();startTimer('${key}',${secs})">${running?'■ 停止':done?'↻ 重来':secs+'秒'}</button>${doneHTML}</span>`;
}

// === DATA ===
const P=[
{name:"PHASE 1 · 唤醒",weeks:"WEEK 1-4",rounds:2,work:25,rest:20,rr:60,ex:[
{n:"臀桥",t:"夹紧屁股顶髋，顶端停1秒",s:25,d:"仰卧在地上，双脚踩地与肩同宽，膝盖弯曲约90度，双手放身体两侧掌心朝下。发力时夹紧屁股，把髋部往天花板方向顶起来，直到身体从肩膀到膝盖成一条直线。在最高点夹紧屁股停1秒，然后慢慢放下来。全程脚掌不要离地，不要用腰往上拱——发力点是屁股，不是腰。如果感觉腰酸说明臀肌没有发力，试试顶起来之前先用力夹一下屁股再往上推。"},
{n:"跪姿俯卧撑",t:"头到膝一条线，胸快碰地再推起",s:25,d:"双膝跪地（膝盖下面垫个毛巾或枕头），双手撑地比肩略宽，手指朝前。从头到膝盖保持一条直线，不要撅屁股也不要塌腰。弯曲手肘让胸口慢慢下沉到快碰地，然后推起来。下去吸气，推起来呼气。做不了的话可以先把手撑在沙发座面上做高位版本。"},
{n:"死虫式（简化版）",t:"对侧手脚伸展，腰紧贴地面",s:25,d:"仰卧，双手伸直指向天花板，双腿抬起屈膝呈90度。然后右手往头顶方向伸直、同时左腿往前伸直（但不碰地），停一下回到起始位置，换左手+右腿。全程腰部紧贴地面不要拱起来。如果腰拱起来了说明幅度太大，缩小伸展范围。这是核心训练里最安全的入门动作。"},
{n:"基础卷腹",t:"只抬肩膀离地，下背始终贴地",s:25,d:"仰卧，双脚踩地膝盖弯曲，双手轻放耳朵旁边（不要抱头）。呼气时收紧腹肌，只把肩膀和上背抬离地面，下背始终贴地。想象肋骨往骨盆方向靠拢。抬到最高点停1秒再慢慢放下。不需要抬很高，感觉到腹肌在发力就对了。不要用手拉脖子。"},
{n:"超人式",t:"上下半身同时抬离地面停2秒",s:25,d:"趴在地上，双臂往前伸展，双腿伸直。同时把上半身（胸口离地）和双腿抬起来，在最高点停2秒再慢慢放下。不用抬很高，感觉到背部和臀部同时在发力就对了。全程不要抬头看前方，目光看地面，保护颈椎。"},
]},
{name:"PHASE 2 · 加量",weeks:"WEEK 5-8",rounds:3,work:30,rest:15,rr:45,ex:[
{n:"单腿臀桥",t:"一腿伸直抬起，单腿撑地顶髋",s:30,d:"和臀桥一样的起始姿势，但一条腿伸直抬起来，只用另一条腿踩地。单腿发力顶髋上去，夹紧屁股停1秒再放下。做完一侧换另一侧。单腿版本强度是双腿的近两倍，一开始顶不太高没关系。如果歪斜得厉害说明两侧力量不平衡，多练弱的那侧。"},
{n:"慢速跪姿俯卧撑",t:"下去3秒，推起1秒",s:30,d:"动作和第一阶段一样，但速度放慢：下去用3秒（心里默数1、2、3），到底后推起来1秒。这种慢速离心让肌肉紧张时间更长，刺激更大。如果已经能做标准俯卧撑就直接做标准版，同样保持慢速下去。"},
{n:"死虫式（完整版）",t:"幅度更大，腰部全程贴地",s:30,d:"和简化版一样的起始姿势，但手和脚都伸展到离地面更近的位置——手往头顶方向尽量伸直、对侧腿也尽量伸直且更低（始终不碰地）。幅度越大核心需要越强的力量来稳定腰椎。腰贴地面是黄金法则，如果腰拱起来了就缩小幅度。"},
{n:"卷腹触膝",t:"抬起时双手碰膝盖，增加幅度",s:30,d:"仰卧屈膝，双手放在大腿上。呼气时收腹卷起，双手沿大腿滑到膝盖，停1秒再慢慢放下。比基础卷腹幅度更大、腹肌收缩更充分。注意是用腹肌的力量把身体卷起来，不是用手拉自己。"},
{n:"超人式+飞鸟",t:"胸口离地同时飞鸟夹背停3秒",s:30,d:"趴着双臂前伸。同时抬起上半身和双腿，在这个超人姿势下做飞鸟——双臂从前方往身体两侧划弧收回，夹紧肩胛骨停3秒，然后手臂伸回前方身体放下。这把核心、下背和上背训练合在一起了。太难的话可以上下半身交替抬。"},
{n:"仰卧交替抬腿",t:"双腿伸直交替抬起，腰贴地",s:30,d:"仰卧，双腿伸直，双手放身体两侧或垫在臀部下面。一条腿抬到约45度角，然后慢慢放下的同时另一条腿抬起来，像剪刀交替。全程腰部紧贴地面（关键！），如果腰拱起来了就把腿抬高一些减小难度。专练下腹。"},
]},
{name:"PHASE 3 · 燃脂",weeks:"WEEK 9-12",rounds:3,work:35,rest:12,rr:30,ex:[
{n:"深蹲",t:"屁股后坐如坐椅子，膝盖不内扣",s:35,d:"双脚与肩同宽站立，脚尖微微外展。下蹲时想象往后坐椅子，屁股先往后推再弯膝下蹲，到大腿约与地面平行后脚跟发力站起来。膝盖方向和脚尖一致不要内扣，背部挺直不弯腰，重心在脚跟和脚掌中部。经过前8周训练膝盖周围已经有基础了。"},
{n:"标准俯卧撑",t:"做不了就继续跪姿，不塌腰",s:35,d:"双手撑地比肩略宽，脚尖撑地，身体从头到脚跟成一条线。弯肘下沉到胸口快碰地再推起。做不了就继续跪姿慢速版，效果一样好。宁可做标准的跪姿版也不要做歪歪扭扭的标准版。"},
{n:"平板支撑转体",t:"交替转身手指天，核心抗旋转",s:35,d:"平板支撑姿势（手臂伸直），右手离地身体转向右侧，右手指向天花板成T字形，停1秒回到平板位置换左手做。转体时身体不要塌，用核心抗旋转。做不了可以把双脚分开宽一些增加稳定性。"},
{n:"卷腹击打",t:"抬起时加出拳动作，带动核心旋转",s:35,d:"仰卧屈膝，双手握拳在胸前。呼气时收腹卷起，同时一只手往对侧方向出拳（右拳打向左膝方向），感受核心的旋转发力，回来换另一侧出拳。这个动作结合了你的拳击基础，既练腹直肌又练腹斜肌，很燃。"},
{n:"交替超人",t:"对侧手脚同时抬起，交替进行",s:35,d:"趴在地上，右手和左腿同时抬起，停2秒放下，换左手和右腿。对侧发力对核心稳定性要求更高。保持目光看地面不要仰头。动作要慢要控制，不要靠惯性甩。"},
{n:"仰卧自行车（慢速）",t:"慢速蹬腿，像骑自行车一样",s:35,d:"仰卧，双手轻放耳旁，双腿抬起。一条腿伸直的同时另一条腿屈膝收向胸口，同时上半身扭转用对侧手肘去碰膝盖方向。交替进行像骑自行车。关键是要慢——每一下用3秒完成，感受腹肌的持续收缩。"},
]}];

const WU=[
{n:"原地踏步摆臂",t:"30s",s:30,tip:"原地走路，膝盖稍抬高，手臂自然前后大幅摆动",d:"就是原地走路但有意识地把膝盖抬高一些，手臂跟着大幅度前后摆动。目的是把心率带起来、让全身关节热开。"},
{n:"站姿髋部画圈",t:"每侧15s",s:15,tip:"单脚站屈膝抬腿用膝盖画圈，可扶墙",d:"单脚站（可扶墙），另一腿屈膝抬起来用膝盖画圈。顺时针逆时针各5-6圈换腿。第一次做可能髋部咔咔响，那是久坐导致的。"},
{n:"站姿体侧扭转",t:"30s",s:30,tip:"双手抬起，左右转腰，转到底停一下",d:"站直，双手抬到胸前交叉或自然抬起。保持下半身不动，上半身慢慢向左转到底停一下，再向右转到底。感觉整个腰腹都在被拧动。"},
{n:"站姿体侧屈",t:"每侧15s",s:15,tip:"一手叉腰一手举过头顶，左右侧弯",d:"站直，右手举过头顶，身体慢慢往左侧弯，感觉右侧腰腹有拉伸。停几秒换另一侧。不要前倾或后仰，纯粹往侧面弯。"},
{n:"髋部画圆",t:"30s",s:30,tip:"双手叉腰，胯部画大圈",d:"双脚与肩同宽站直，双手叉腰。胯部往前、右、后、左画大圈，像呼啦圈一样。顺时针逆时针各画8-10圈。把整个腰髋都转开。"},
];

const ST=[
{n:"婴儿式",t:"30-45s",s:40,p:true,d:"跪在地上，屁股坐到脚后跟上，双手尽量往前伸，额头贴地，胸口往下沉。全身放松自然呼吸。膝盖不舒服的话垫个枕头。"},
{n:"仰卧脊柱扭转",t:"每侧30s",s:30,p:true,d:"仰卧，双臂T字张开。一腿弯曲用对侧手把膝盖拉向另一侧，头转反方向。背部可能会噼啪响，那是脊椎小关节释放气泡，正常。"},
{n:"仰卧抱膝",t:"每侧20s+双腿20s",s:20,p:true,d:"仰卧，一腿弯曲双手抱膝往胸口拉，另一腿伸直。感觉下背被压向地面。左右各做一次最后双腿一起抱。"},
{n:"仰卧4字拉伸",t:"每侧25s",s:25,d:"仰卧，左脚踝搭在右膝上成4字形，双手抱住右大腿往胸口拉。感觉左侧臀部深处拉伸。换另一侧。这个替代了弓步拉髋，躺着做对膝盖更友好。"},
{n:"猫牛式（选做）",t:"8-10次",s:50,d:"四点跪姿。吸气塌腰抬头翘屁股（牛式）；呼气拱背低头收紧肚子（猫式）。做8-10次。如果搞不清楚动作可以跳过这个。"},
];

const MI=[
{n:"站姿夹臀",de:"5-6次，夹3秒松开",d:"站直用力夹紧屁股3秒再松开，重复5-6次。提醒久坐沉睡的臀肌醒过来。"},
{n:"站姿飞鸟",de:"10次，慢速",d:"双臂侧平举，掌心朝前，肩胛骨夹紧停3秒再放下。做完马上觉得背挺起来了。"},
{n:"坐姿脊柱转体",de:"每侧15s",d:"坐椅子上一手搭对侧膝盖一手搭椅背，慢慢转身往后看。"},
{n:"坐姿翘腿拉梨状肌",de:"每侧15s",d:"脚踝搭对侧膝盖（翘二郎腿），身体前倾。拉屁股深处的梨状肌。"},
];

const WD=["一","二","三","四","五","六","日"];
const IC={warmup:"var(--gold)",main:"var(--cyan)",stretch:"var(--coral)",micro:"var(--dim)"};

function td(){return new Date().toISOString().slice(0,10)}
function fd(s){const d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"."+d.getDate()}
function gw(o){const t=new Date(),day=t.getDay(),m=new Date(t);m.setDate(t.getDate()-((day+6)%7)+o*7);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d.toISOString().slice(0,10)})}
function lr(d){try{const s=localStorage.getItem("wk:"+d);return s?JSON.parse(s):null}catch(e){return null}}
function sr(d,r){try{localStorage.setItem("wk:"+d,JSON.stringify(r))}catch(e){}}
// exRounds: {0:2, 1:1, ...} = exercise index → completed round count
function gr(d){return lr(d)||{warmup:[],main:[],stretch:[],micro:0,completed:false,rest:false,exRounds:{}}}
function lp(){try{return parseInt(localStorage.getItem("wk:phase")||"0",10)}catch(e){return 0}}
function sp(p){try{localStorage.setItem("wk:phase",String(p))}catch(e){}}
function cs(){let c=0;const d=new Date(),tr=gr(td()),done=tr.completed||tr.rest;if(!done)d.setDate(d.getDate()-1);for(let i=0;i<90;i++){const s=d.toISOString().slice(0,10),r=gr(s);if(r.completed||r.rest){c++;d.setDate(d.getDate()-1)}else break}if(done)c++;return c}

function migrateRecord(r){
  if(typeof r.warmup==='boolean'){r.warmup=r.warmup?WU.map((_,i)=>i):[];}
  if(typeof r.stretch==='boolean'){r.stretch=r.stretch?ST.map((_,i)=>i):[];}
  if(!Array.isArray(r.warmup))r.warmup=[];
  if(!Array.isArray(r.stretch))r.stretch=[];
  // Migrate from old rounds[] system to exRounds{}
  if(r.rounds&&!r.exRounds){
    r.exRounds={};
    // Old system stored per-round arrays; count how many rounds each exercise appeared in
    if(Array.isArray(r.rounds)){
      const ph=P[S.phase];
      ph.ex.forEach((_,i)=>{
        let cnt=0;
        r.rounds.forEach(rd=>{if(rd&&rd.includes(i))cnt++;});
        if(cnt>0)r.exRounds[i]=cnt;
      });
    }
    delete r.rounds;delete r.currentRound;
  }
  if(!r.exRounds)r.exRounds={};
  return r;
}

let S={phase:lp(),wo:0,sel:td(),exp:"main",cd:{}};

function isAllWarmupDone(r){return r.warmup.length>=WU.length}
function isAllStretchDone(r){return r.stretch.length>=ST.length}
function isAllMainDone(r){
  const ph=P[S.phase];
  return ph.ex.every((_,i)=>(r.exRounds[i]||0)>=ph.rounds);
}
function checkCompleted(r){
  r.completed=isAllWarmupDone(r)&&isAllStretchDone(r)&&isAllMainDone(r);
}

// Advance one round for exercise i
function advanceExRound(i){
  const r=migrateRecord(gr(S.sel));
  const ph=P[S.phase];
  const cur=r.exRounds[i]||0;
  if(cur<ph.rounds){
    r.exRounds[i]=cur+1;
    // Check if this exercise just completed all rounds
    if(r.exRounds[i]>=ph.rounds){
      // Check if ALL exercises are now done
      const allDone=ph.ex.every((_,j)=>(r.exRounds[j]||0)>=ph.rounds);
      if(allDone){
        showToast('全部动作完成！','所有轮次已完成，太强了 💪');
      }
    }
    checkCompleted(r);sr(S.sel,r);render();
  }
}

// Toggle: click checkbox directly to +1 or undo last round
window.tmMain=function(i){
  const r=migrateRecord(gr(S.sel));
  const ph=P[S.phase];
  const cur=r.exRounds[i]||0;
  if(cur>=ph.rounds){
    // Already maxed, undo last round
    r.exRounds[i]=cur-1;
  }else{
    r.exRounds[i]=cur+1;
    if(r.exRounds[i]>=ph.rounds){
      const allDone=ph.ex.every((_,j)=>(r.exRounds[j]||0)>=ph.rounds);
      if(allDone) showToast('全部动作完成！','所有轮次已完成，太强了 💪');
    }
  }
  checkCompleted(r);sr(S.sel,r);render();
};

function showToast(title,sub){
  document.getElementById('atTitle').textContent=title;
  document.getElementById('atSub').textContent=sub;
  document.getElementById('atOverlay').classList.add('show');
  document.getElementById('allToast').classList.add('show');
  playTimerDone();
}
window.dismissToast=function(){
  document.getElementById('atOverlay').classList.remove('show');
  document.getElementById('allToast').classList.remove('show');
}

function render(){
const today=td(),ph=P[S.phase],wd=gw(S.wo),rec=migrateRecord(gr(S.sel)),streak=cs();
const cd=wd.filter(d=>{const r=gr(d);return r.completed||r.rest}).length;
// Compute total progress
let totalDoneRounds=0,totalNeededRounds=ph.ex.length*ph.rounds;
ph.ex.forEach((_,i)=>{totalDoneRounds+=Math.min(rec.exRounds[i]||0,ph.rounds);});

let h=`<div class="hd"><div class="hd-in"><h1>特别高度机密行动组</h1><div class="sk"><div class="sk-n">${streak}</div><div class="sk-l">连续</div></div></div>
<div class="pb">${P.map((p,i)=>`<div class="pt ${i===S.phase?'a':''}" onclick="xp(${i})">${p.name}<small>${p.weeks}</small></div>`).join("")}</div></div>
<div class="wn"><div class="wh"><button class="nb" onclick="nw(-1)">‹</button><span>本周 ${cd}/7${S.wo!==0?`<button class="bb" onclick="gt()">回到今天</button>`:''}</span><button class="nb" onclick="nw(1)">›</button></div>
<div class="wr">${wd.map((d,i)=>{const r=gr(d),dn=r.completed||r.rest,sl=d===S.sel,it=d===today;
return`<div class="db ${sl?'s':''} ${it?'t':''} ${dn?'dn':''}" onclick="sd('${d}')"><div class="dl">${WD[i]}</div><div class="dd">${fd(d)}</div><div class="ds">${dn?(r.rest?'🌙':'✓'):''}</div></div>`}).join("")}</div></div>
<div class="ct">`;

if(rec.rest){h+=`<div class="rv"><div class="re">🌙</div><div class="rtt">休息日</div><div class="rs">肌肉恢复时在消耗脂肪<br>建议做5-10分钟拉伸</div><button class="rb" onclick="tr()">改为训练日</button></div>`}
else{
h+=`<div class="rt"><button class="rb" onclick="tr()">🌙 休息日</button></div>`;
// WARMUP
h+=rs("warmup","热身","2-3 分钟 · "+rec.warmup.length+"/"+WU.length,()=>{
return WU.map((w,i)=>{const dn=rec.warmup.includes(i);
return`<div class="ei"><div class="ei-wrap" onclick="toggleWarmupItem(${i})"><div class="cb ${dn?'ck':''}">✓</div><div style="flex:1"><div class="en ${dn?'ck':''}">${w.n}</div><div class="et">${w.tip}</div>${rd('wu'+i,w.d)}</div></div><div class="tm-area">${timerHTML('wu'+i,w.s)}</div></div>`}).join("")});
// MAIN
h+=rs("main",ph.name,`${ph.rounds}轮 × ${ph.ex.length}动作 · ${ph.work}s/${ph.rest}s`,()=>{
let c=ph.ex.map((e,i)=>{
  const done=rec.exRounds[i]||0;
  const allDone=done>=ph.rounds;
  const half=done>0&&!allDone;
  // Round dots
  let dots='<div class="rd-row"><span class="rd-lbl">轮</span>';
  for(let ri=0;ri<ph.rounds;ri++){
    const isDone=ri<done;
    const isCur=ri===done&&!allDone;
    dots+=`<div class="rd-dot ${isDone?'done':''} ${isCur?'cur':''}"></div>`;
  }
  dots+='</div>';
  return`<div class="ei"><div class="ei-wrap" onclick="tmMain(${i})"><div class="cb ${allDone?'ck':''} ${half?'half':''}">✓</div><div style="flex:1"><div class="en ${allDone?'ck':''}">${e.n}</div><div class="et">${e.t}</div>${rd('m'+S.phase+'_'+i,e.d)}</div></div><div class="tm-area">${dots}${timerHTML('m'+S.phase+'_'+i,e.s)}</div></div>`}).join("");
c+=`<div class="pg"><div class="pf" style="width:${totalNeededRounds?totalDoneRounds/totalNeededRounds*100:0}%"></div></div>`;
return c});
// STRETCH
h+=rs("stretch","拉伸","5 分钟 · "+rec.stretch.length+"/"+ST.length,()=>{
return ST.map((s,i)=>{const dn=rec.stretch.includes(i);
return`<div class="ei"><div class="ei-wrap" onclick="toggleStretchItem(${i})"><div class="cb ${dn?'ck':''}">✓</div><div style="flex:1"><div class="en ${dn?'ck':''}">${s.p?'<span class="stag">必做</span>':''}${s.n}</div><div class="et">${s.t}</div>${rd('st'+i,s.d)}</div></div><div class="tm-area">${timerHTML('st'+i,s.s)}</div></div>`}).join("")});
// MICRO
h+=rs("micro","久坐微动","每小时 1 次",()=>{
let c=MI.map((m,i)=>`<div class="mr"><div class="mn">${m.n}</div><div class="md">${m.de}</div>${rd('mi'+i,m.d)}</div>`).join("");
c+=`<div class="mc"><div><span class="mc-n">${rec.micro||0}</span><span class="mc-l">次</span></div><button class="mc-a" onclick="am()">+1</button></div>`;return c});
if(rec.completed)h+=`<div class="dn-b"><div class="de">⚓</div><div class="dtt">任务完成</div><div class="dss">深海的回响，明天继续</div></div>`;
}
h+=`</div>`;document.getElementById("app").innerHTML=h}

function rs(k,t,s,fn){const o=S.exp===k,c=IC[k];return`<div class="sc"><div class="sh" onclick="te('${k}')"><div style="display:flex;align-items:center"><div class="si" style="background:${c}"></div><div><div class="st">${t}</div><div class="ss">${s}</div></div></div><span class="ar ${o?'o':''}">›</span></div>${o?`<div class="sb">${fn()}</div>`:''}</div>`}
function rd(k,t){const c=S.cd[k];return`<div><span class="dt" onclick="event.stopPropagation();tg('${k}')">${c?'▸ 展开':'▾ 收起'}</span>${c?'':`<div class="ed">${t}</div>`}</div>`}

window.xp=function(i){S.phase=i;sp(i);render()};
window.nw=function(d){S.wo+=d;render()};
window.gt=function(){S.wo=0;S.sel=td();render()};
window.sd=function(d){S.sel=d;render()};
window.te=function(k){S.exp=S.exp===k?null:k;render()};
window.tg=function(k){S.cd[k]=!S.cd[k];render()};

window.toggleWarmupItem=function(i){
  const r=migrateRecord(gr(S.sel));
  const a=[...r.warmup];
  if(a.includes(i))a.splice(a.indexOf(i),1);else a.push(i);
  r.warmup=a;checkCompleted(r);sr(S.sel,r);render();
};
window.toggleStretchItem=function(i){
  const r=migrateRecord(gr(S.sel));
  const a=[...r.stretch];
  if(a.includes(i))a.splice(a.indexOf(i),1);else a.push(i);
  r.stretch=a;checkCompleted(r);sr(S.sel,r);render();
};
window.am=function(){const r=migrateRecord(gr(S.sel));r.micro=(r.micro||0)+1;sr(S.sel,r);render()};
window.tr=function(){const r=gr(S.sel);r.rest=!r.rest;r.completed=false;r.warmup=[];r.main=[];r.stretch=[];r.exRounds={};sr(S.sel,r);render()};
render();
</script>
